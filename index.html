<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotonLab (Simple) — Snell's Law Simulator</title>

<style>
  /* ---------- BASIC PAGE STYLE ---------- */
  body {
    background: #0a0b14;      /* dark background */
    color: #e8ecff;           /* light text */
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 4px;
  }

  p.subtitle {
    text-align: center;
    color: #9ba3c9;
    margin-top: 0;
    margin-bottom: 30px;
  }

  /* Main layout: controls on the left, diagram + info on the right.
     On small screens this just stacks into one column. */
  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .panel {
    background: #161826;
    border: 1px solid #2a2d42;
    border-radius: 12px;
    padding: 20px;
  }

  #controls {
    flex: 1 1 260px;
  }

  #diagram-panel {
    flex: 2 1 400px;
  }

  #info-panel {
    flex: 1 1 260px;
  }

  label {
    display: block;
    margin-top: 14px;
    margin-bottom: 6px;
    font-size: 0.85rem;
    color: #9ba3c9;
  }

  select, input[type="number"] {
    width: 100%;
    padding: 8px;
    background: #0f1120;
    color: #e8ecff;
    border: 1px solid #2a2d42;
    border-radius: 6px;
  }

  input[type="range"] {
    width: 100%;
  }

  #angleValue {
    font-weight: bold;
    color: #ff5b54;
  }

  .preset-buttons button {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 8px;
    background: #0f1120;
    color: #e8ecff;
    border: 1px solid #2a2d42;
    border-radius: 6px;
    cursor: pointer;
  }

  .preset-buttons button:hover {
    border-color: #5b8cff;
  }

  #reset {
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #2a2d42;
    color: #e8ecff;
    border-radius: 6px;
    cursor: pointer;
  }

  canvas {
    width: 100%;
    height: 350px;
    background: #0f1120;
    border-radius: 8px;
    display: block;
  }

  #tirWarning {
    display: none;              /* hidden unless total internal reflection happens */
    margin-top: 10px;
    padding: 10px;
    background: #3a2a10;
    border: 1px solid #ffb84d;
    color: #ffb84d;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
  }

  #equation {
    margin-top: 20px;
    font-family: monospace;
    font-size: 1.1rem;
    text-align: center;
    background: #0f1120;
    padding: 14px;
    border-radius: 8px;
  }

  #explanation {
    margin-top: 20px;
    line-height: 1.6;
    color: #c7cbe8;
  }
</style>
</head>
<body>

<h1>PhotonLab</h1>
<p class="subtitle">A simple Snell's Law simulator</p>

<div class="container">

  <!-- ============ LEFT: CONTROLS ============ -->
  <div class="panel" id="controls">
    <h3>Controls</h3>

    <label for="medium1">Medium 1 (incidence)</label>
    <select id="medium1">
      <option value="1.00">Air (1.00)</option>
      <option value="1.33">Water (1.33)</option>
      <option value="1.52">Glass (1.52)</option>
      <option value="2.42">Diamond (2.42)</option>
    </select>

    <label for="medium2">Medium 2 (refraction)</label>
    <select id="medium2">
      <option value="1.00">Air (1.00)</option>
      <option value="1.33" selected>Water (1.33)</option>
      <option value="1.52">Glass (1.52)</option>
      <option value="2.42">Diamond (2.42)</option>
    </select>

    <label for="angle">Angle of incidence: <span id="angleValue">30°</span></label>
    <input type="range" id="angle" min="0" max="89" value="30">

    <label>Presets</label>
    <div class="preset-buttons">
      <button onclick="setPreset(1.00, 1.33, 30)">Air → Water</button>
      <button onclick="setPreset(1.33, 1.00, 30)">Water → Air</button>
      <button onclick="setPreset(1.00, 1.52, 40)">Air → Glass</button>
      <button onclick="setPreset(2.42, 1.00, 35)">Diamond → Air (TIR)</button>
    </div>

    <button id="reset" onclick="setPreset(1.00, 1.33, 30)">Reset</button>
  </div>

  <!-- ============ MIDDLE: RAY DIAGRAM ============ -->
  <div class="panel" id="diagram-panel">
    <h3>Ray Diagram</h3>
    <canvas id="rayCanvas" width="600" height="350"></canvas>
    <div id="tirWarning">⚠ TOTAL INTERNAL REFLECTION</div>
  </div>

  <!-- ============ RIGHT: EQUATION + EXPLANATION ============ -->
  <div class="panel" id="info-panel">
    <h3>Snell's Law</h3>
    <div id="equation">n₁ sin(θ₁) = n₂ sin(θ₂)</div>
    <div id="explanation">Adjust the controls to see how light bends.</div>
  </div>

</div>

<script>
  /* =====================================================
     PHYSICS — this matches the original Python logic:

     n1 * sin(i) = n2 * sin(r)
     r = asin( (n1 / n2) * sin(i) )

     If (n1/n2) * sin(i) >= 1, there is no valid angle r,
     so we report Total Internal Reflection instead.
  ===================================================== */
  function calculateRefraction(n1, n2, incidenceDeg) {
    const incidenceRad = incidenceDeg * Math.PI / 180;
    const ratio = (n1 / n2) * Math.sin(incidenceRad);

    if (ratio >= 1) {
      return { tir: true, refractionDeg: null };
    }

    const refractionRad = Math.asin(ratio);
    const refractionDeg = refractionRad * 180 / Math.PI;
    return { tir: false, refractionDeg: refractionDeg };
  }

  /* =====================================================
     GRAB THE HTML ELEMENTS WE NEED TO READ AND UPDATE
  ===================================================== */
  const medium1Select = document.getElementById("medium1");
  const medium2Select = document.getElementById("medium2");
  const angleSlider = document.getElementById("angle");
  const angleValueLabel = document.getElementById("angleValue");
  const equationDiv = document.getElementById("equation");
  const explanationDiv = document.getElementById("explanation");
  const tirWarning = document.getElementById("tirWarning");
  const canvas = document.getElementById("rayCanvas");
  const ctx = canvas.getContext("2d");

  /* =====================================================
     MAIN UPDATE FUNCTION
     Runs every time the user changes a control.
     1. Reads the current inputs
     2. Calculates the refraction
     3. Updates the text panels
     4. Redraws the ray diagram
  ===================================================== */
  function update() {
    const n1 = parseFloat(medium1Select.value);
    const n2 = parseFloat(medium2Select.value);
    const angle = parseFloat(angleSlider.value);

    angleValueLabel.textContent = angle + "°";

    const result = calculateRefraction(n1, n2, angle);

    updateEquationText(n1, n2, angle, result);
    updateExplanationText(n1, n2, result);
    drawRayDiagram(n1, n2, angle, result);
  }

  function updateEquationText(n1, n2, angle, result) {
    if (result.tir) {
      equationDiv.textContent =
        n1.toFixed(2) + " × sin(" + angle.toFixed(0) + "°) ≥ " + n2.toFixed(2) + " × 1.00  →  no solution for θ₂";
      tirWarning.style.display = "block";
    } else {
      equationDiv.textContent =
        n1.toFixed(2) + " × sin(" + angle.toFixed(0) + "°) = " +
        n2.toFixed(2) + " × sin(" + result.refractionDeg.toFixed(2) + "°)";
      tirWarning.style.display = "none";
    }
  }

  function updateExplanationText(n1, n2, result) {
    if (result.tir) {
      explanationDiv.textContent =
        "The light is going into a less dense medium at too steep an angle. " +
        "Snell's Law has no valid solution, so all of the light reflects back " +
        "instead of refracting through. This is Total Internal Reflection.";
    } else if (n2 > n1) {
      explanationDiv.textContent =
        "The light enters a denser medium, so it slows down and bends TOWARD the normal line.";
    } else if (n2 < n1) {
      explanationDiv.textContent =
        "The light enters a less dense medium, so it speeds up and bends AWAY from the normal line.";
    } else {
      explanationDiv.textContent =
        "Both media have the same refractive index, so the light passes straight through with no bending.";
    }
  }

  /* =====================================================
     DRAWING THE RAY DIAGRAM ON THE CANVAS
     This is simplified: no smooth animation loop,
     it just redraws once every time something changes.
  ===================================================== */
  function drawRayDiagram(n1, n2, angle, result) {
    const width = canvas.width;
    const height = canvas.height;
    const centerX = width / 2;
    const centerY = height / 2;
    const rayLength = 140;

    ctx.clearRect(0, 0, width, height);

    // Boundary line (horizontal, splits the two media)
    ctx.strokeStyle = "#2a2d42";
    ctx.beginPath();
    ctx.moveTo(0, centerY);
    ctx.lineTo(width, centerY);
    ctx.stroke();

    // Normal line (dashed, vertical)
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = "#555a77";
    ctx.beginPath();
    ctx.moveTo(centerX, centerY - rayLength - 20);
    ctx.lineTo(centerX, centerY + rayLength + 20);
    ctx.stroke();
    ctx.restore();

    // Incident ray: comes from top-left, hits the center point
    const angleRad = angle * Math.PI / 180;
    const startX = centerX - Math.sin(angleRad) * rayLength;
    const startY = centerY - Math.cos(angleRad) * rayLength;
    drawLine(startX, startY, centerX, centerY, "#ff5b54");

    if (result.tir) {
      // Reflected ray: bounces back up on the same side
      const endX = centerX + Math.sin(angleRad) * rayLength;
      const endY = centerY - Math.cos(angleRad) * rayLength;
      drawLine(centerX, centerY, endX, endY, "#ffb84d");
    } else {
      // Refracted ray: continues down into medium 2 at the new angle
      const refractionRad = result.refractionDeg * Math.PI / 180;
      const endX = centerX + Math.sin(refractionRad) * rayLength;
      const endY = centerY + Math.cos(refractionRad) * rayLength;
      drawLine(centerX, centerY, endX, endY, "#5b8cff");
    }

    // Labels
    ctx.fillStyle = "#9ba3c9";
    ctx.font = "12px monospace";
    ctx.fillText("Medium 1  n=" + n1.toFixed(2), 10, 18);
    ctx.fillText("Medium 2  n=" + n2.toFixed(2), 10, height - 10);
  }

  function drawLine(x1, y1, x2, y2, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  /* =====================================================
     PRESET BUTTONS
     Sets both dropdowns and the slider, then updates.
  ===================================================== */
  function setPreset(n1, n2, angle) {
    medium1Select.value = n1.toFixed(2);
    medium2Select.value = n2.toFixed(2);
    angleSlider.value = angle;
    update();
  }

  /* =====================================================
     EVENT LISTENERS
     Whenever a control changes, run update().
  ===================================================== */
  medium1Select.addEventListener("change", update);
  medium2Select.addEventListener("change", update);
  angleSlider.addEventListener("input", update);

  // Run once on page load so the diagram isn't blank
  update();
</script>

</body>
</html>
